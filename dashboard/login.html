<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LboCraft — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e1a;
      --bg2: #0d1333;
      --surface: rgba(255,255,255,0.03);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.12);
      --text: #e8edf5;
      --text2: #8892a8;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --accent-glow: rgba(0,212,255,0.15);
      --radius: 16px;
      --font: 'IBM Plex Sans Arabic', sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background effects */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .bg-glow-1 {
      position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }
    .bg-glow-2 {
      position: fixed; bottom: -200px; left: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }

    /* Login card */
    .login-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 2rem;
    }
    .login-card {
      background: rgba(13,19,51,0.8);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; right: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    }
    .login-card::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top center, rgba(0,212,255,0.04), transparent 60%);
      pointer-events: none;
    }

    .login-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.4rem; font-weight: 800; color: #fff;
      box-shadow: 0 8px 32px rgba(0,212,255,0.2);
    }
    .login-title {
      text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem;
    }
    .login-sub {
      text-align: center; color: var(--text2); font-size: 0.85rem; margin-bottom: 2.5rem;
    }

    .field-label {
      display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2);
      margin-bottom: 0.5rem;
    }

    /* Passcode input row */
    .passcode-row {
      display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 1.5rem;
      direction: ltr;
    }
    .passcode-digit {
      width: 56px; height: 64px;
      background: var(--surface);
      border: 2px solid var(--border2);
      border-radius: 14px;
      text-align: center;
      font-family: var(--font);
      font-size: 1.6rem; font-weight: 700;
      color: var(--text);
      outline: none;
      transition: all 0.25s ease;
      -webkit-text-fill-color: var(--text);
    }
    .passcode-digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow), 0 0 20px rgba(0,212,255,0.1);
      background: rgba(0,212,255,0.04);
    }
    .passcode-digit.filled {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .login-error {
      text-align: center; color: #ff4757; font-size: 0.8rem; font-weight: 600;
      margin-bottom: 1rem; opacity: 0; transition: opacity 0.3s;
    }
    .login-error.show { opacity: 1; }

    .login-btn {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      color: #fff; font-family: var(--font);
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative; z-index: 1;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,255,0.3);
    }
    .login-btn:active { transform: translateY(0); }

    .login-footer {
      text-align: center; margin-top: 2rem;
      font-size: 0.75rem; color: var(--text2);
    }
    .login-footer a { color: var(--accent); text-decoration: none; }

    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      margin-top: 1.5rem; color: var(--text2); font-size: 0.8rem;
      text-decoration: none; transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; transform: scaleX(-1); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes successPulse {
      0% { box-shadow: 0 0 0 0 rgba(0,230,118,0.4); }
      100% { box-shadow: 0 0 0 20px rgba(0,230,118,0); }
    }
    .login-card.success { border-color: rgba(0,230,118,0.4); }
    .login-card.success .login-btn {
      background: linear-gradient(135deg, #00e676, #00c853);
      animation: successPulse 0.8s ease;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="login-wrapper">
  <div class="login-card" id="loginCard">
    <div class="login-logo">LC</div>
    <h1 class="login-title">LboCraft</h1>
    <p class="login-sub">أدخل رمز المرور للدخول إلى لوحة التحكم</p>

    <span class="field-label" style="text-align:center;display:block;">رمز المرور</span>
    <div class="passcode-row">
      <input type="password" maxlength="1" class="passcode-digit" data-i="0" inputmode="numeric" autocomplete="off">
      <input type="password" maxlength="1" class="passcode-digit" data-i="1" inputmode="numeric" autocomplete="off">
      <input type="password" maxlength="1" class="passcode-digit" data-i="2" inputmode="numeric" autocomplete="off">
      <input type="password" maxlength="1" class="passcode-digit" data-i="3" inputmode="numeric" autocomplete="off">
    </div>

    <div class="login-error" id="loginErr">رمز المرور غير صحيح — حاول مرة أخرى</div>
    <button class="login-btn" id="loginBtn">دخول</button>

    <a href="../index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      العودة للموقع
    </a>
  </div>

  <div class="login-footer">
    <a href="../index.html">درب النجاح للتسويق الالكتروني</a> © 2026
  </div>
</div>

<script>
(function(){
  var PASSCODE = '0099';
  var digits = document.querySelectorAll('.passcode-digit');
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginErr');
  var card = document.getElementById('loginCard');

  // Redirect if already logged in
  if (localStorage.getItem('lbc_auth') === '1') {
    location.href = 'panel.html';
    return;
  }

  digits[0].focus();

  digits.forEach(function(d, i) {
    d.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '');
      if (this.value) {
        this.classList.add('filled');
        if (i < 3) digits[i + 1].focus();
        if (i === 3) tryLogin();
      } else {
        this.classList.remove('filled');
      }
    });
    d.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) {
        digits[i - 1].focus();
        digits[i - 1].value = '';
        digits[i - 1].classList.remove('filled');
      }
      if (e.key === 'Enter') tryLogin();
    });
    d.addEventListener('paste', function(e) {
      e.preventDefault();
      var v = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
      for (var j = 0; j < Math.min(v.length, 4); j++) {
        digits[j].value = v[j];
        digits[j].classList.add('filled');
      }
      if (v.length >= 4) tryLogin();
    });
  });

  btn.addEventListener('click', tryLogin);

  function tryLogin() {
    var code = '';
    digits.forEach(function(d) { code += d.value; });
    if (code.length < 4) return;

    if (code === PASSCODE) {
      card.classList.add('success');
      err.classList.remove('show');
      localStorage.setItem('lbc_auth', '1');
      setTimeout(function() {
        location.href = 'panel.html';
      }, 600);
    } else {
      err.classList.add('show');
      card.classList.add('shake');
      setTimeout(function() { card.classList.remove('shake'); }, 400);
      digits.forEach(function(d) { d.value = ''; d.classList.remove('filled'); });
      digits[0].focus();
    }
  }
})();
</script>
</body>
</html>
